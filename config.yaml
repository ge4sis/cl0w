# cl0w config.yaml — Agent Gateway

telegram:
  mode: polling              # polling | webhook
  # webhook_url: https://your.domain/webhook   # webhook 모드 시만 필요

# 기본 프로바이더 (사용자가 /provider 로 변경 가능)
default_provider: openai

# 프로바이더 오류 시 자동 전환 체인
fallback_chain:
  - openai
  - lmstudio
  - ollama
  - gemini

providers:
  openai:
    base_url: https://api.openai.com/v1
    model: gpt-4o

  lmstudio:
    base_url: http://localhost:1234/v1
    model: local-model

  ollama:
    base_url: http://localhost:11434/v1
    model: llama3.3

  gemini:
    # Google 공식 OpenAI 호환 엔드포인트 — 별도 어댑터 불필요
    base_url: https://generativelanguage.googleapis.com/v1beta/openai
    model: gemini-2.0-flash

  # claude:
  #   # Anthropic 네이티브 API는 OpenAI와 호환되지 않으므로, 
  #   # 호환 프록시(LiteLLM 등)를 사용하는 경우에만 활성화하십시오.
  #   base_url: http://localhost:4000/v1
  #   model: claude-3-7-sonnet-20250219

# 사용자별 개별 설정 (선택)
# users:
#   123456789:
#     default_provider: claude
#     rate_limit: 30
#   987654321:
#     default_provider: ollama
#     rate_limit: 10

# 전역 Rate Limit (msg/min per user)
rate_limit: 20

# 입력 메시지 최대 길이
max_input_chars: 4096

# 대화 세션
session:
  persist: true          # false 면 재시작 시 기록 소멸
  max_turns: 50          # 초과 시 오래된 턴부터 삭제
  dir: ./sessions

# Tool 플러그인
tools_dir: ./tools
hot_reload_interval: 5   # 초 — watchdog 없이 mtime 폴링

# 파일 처리
file:
  max_size_mb: 20
  max_text_chars: 50000
  pdf_max_pages: 100
  pdf_support: true

# 관찰가능성
observability:
  log_level: info          # debug | info | warn | error
  # admin_chat_id: 123456789   # 오류 알림 받을 관리자 Telegram chat_id

# ── MCP 서버 연동 (선택) ─────────────────────────────────────────────────────

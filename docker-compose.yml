services:
  cl0w:
    build: .
    restart: unless-stopped

    # 보안: 루트 파일시스템 read-only
    read_only: true
    tmpfs:
      - /tmp                      # 임시 파일용 메모리 디스크

    volumes:
      # tools: bind mount — 로컬에서 파일 추가/삭제 즉시 반영
      - ./tools:/app/tools
      # sessions: named volume — 컨테이너 재시작 후에도 대화 보존
      - sessions:/app/sessions

    env_file: .env

    # ── 로컬 LLM 접근 ──────────────────────────────────────────────────────
    # Docker Desktop (Windows / macOS): host.docker.internal 이 자동 등록되므로
    # 아래 extra_hosts 블록 전체를 삭제하거나 주석 처리하세요.
    #
    # Linux Docker Engine 에서만 아래 줄이 필요합니다.
    extra_hosts:
      - "host.docker.internal:host-gateway"   # Linux only — Windows/macOS 에서 제거

volumes:
  sessions:
